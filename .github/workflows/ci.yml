name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install shellcheck and bats
        run: sudo apt-get update && sudo apt-get install -y shellcheck bats

      - run: pnpm install --frozen-lockfile

      - name: Lint + test affected projects
        if: github.event_name == 'pull_request'
        run: pnpm exec nx affected -t lint,test --base=origin/${{ github.base_ref }} --head=HEAD

      - name: Lint + test all projects
        if: github.event_name != 'pull_request'
        run: pnpm exec nx run-many -t lint,test
